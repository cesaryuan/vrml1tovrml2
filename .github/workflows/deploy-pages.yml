name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Set up GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Build WebAssembly package
        run: wasm-pack build --release --target web --out-dir web-dist/pkg --out-name vrml1tovrml2

      - name: Stage static site files
        run: |
          cp web/index.html web/app.js web/styles.css web-dist/
          mkdir -p web-dist/examples
          cp examples/sample_v1.wrl examples/sample_v2.wrl web-dist/examples/

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web-dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
